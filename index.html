          textureX: (Math.random() - 0.5) * 0.08,
          textureY: (Math.random() - 0.5) * 0.08,
          crumple: Array.from({ length: 18 }, () => ({
            a: Math.random() * Math.PI * 2,
            d: Math.random() * 0.92,
            len: 0.32 + Math.random() * 0.62,
            w: 0.5 + Math.random() * 1.4,
            alpha: 0.10 + Math.random() * 0.22
          }))
        };
      });
    }

    function keepBallsInView() {
      for (const ball of state.balls) {
        ball.x = clamp(ball.x, ball.r + 20, state.width - ball.r - 20);
        ball.y = clamp(ball.y, ball.r + 56, state.height - ball.r - 20);
        ball.baseX = clamp(ball.baseX, ball.r + 20, state.width - ball.r - 20);
        ball.baseY = clamp(ball.baseY, ball.r + 56, state.height - ball.r - 20);
      }
    }

    function resetInteractionState() {
      state.selected = null;
      state.grabbed = null;
      state.opened = null;
      state.trash = null;
      state.currentDrawRecord = null;
      state.actionHover = null;
      state.actionHoverSince = 0;
      state.actionLastTriggeredAt = 0;
      state.centerConfirmProgress = 0;
      state.pinchStartedAt = 0;
      state.openPalmSince = 0;
      state.openPalmLastPoint = null;
      state.openPalmBlastUntil = 0;
      state.wasOpenPalm = false;
      state.wasClasped = false;
      state.trashCooldownUntil = performance.now() + 520;
      redrawButton.classList.remove("is-gesture-hover");
      shareCardButton.classList.remove("is-gesture-hover");
    }

    function switchScene(sceneKey) {
      if (!scenes[sceneKey] || sceneKey === state.activeScene) return;
      state.activeScene = sceneKey;
      sceneSelect.value = sceneKey;
      managerSceneKey = sceneKey;
      resetInteractionState();
      createBalls({ animate: true });
      state.status = scenes[sceneKey].name;
      statusEl.textContent = scenes[sceneKey].name;
      renderManager();
    }

    function setupSceneSelect() {
      refreshSceneSelect();
      sceneSelect.addEventListener("change", () => switchScene(sceneSelect.value));
    }

    function refreshSceneSelect() {
      sceneSelect.innerHTML = Object.entries(scenes)
        .map(([key, scene]) => `<option value="${escapeHtml(key)}">${escapeHtml(scene.name)}</option>`)
        .join("");
      if (!scenes[state.activeScene]) state.activeScene = firstSceneKey();
      sceneSelect.value = state.activeScene;
    }

    function refreshManagerSceneSelect() {
      managerSceneSelect.innerHTML = Object.entries(scenes)
        .map(([key, scene]) => `<option value="${escapeHtml(key)}">${escapeHtml(scene.name)}</option>`)
        .join("");
      if (!scenes[managerSceneKey]) managerSceneKey = state.activeScene;
      managerSceneSelect.value = managerSceneKey;
    }

    function renderManager() {
      if (managerBackdrop.hidden) return;
      refreshManagerSceneSelect();
      const scene = scenes[managerSceneKey] || currentScene();
      sceneNameInput.value = scene.name;
      answerList.innerHTML = scene.answers.map((answer, index) => `
        <div class="answer-row">
          <input class="manager-input answer-input" type="text" value="${escapeHtml(answer)}" data-index="${index}" aria-label="答案 ${index + 1}">
          <button class="manager-button manager-danger answer-delete" type="button" data-index="${index}">删除答案</button>
        </div>
      `).join("");
    }

    function openManager() {
      managerSceneKey = state.activeScene;
      managerBackdrop.hidden = false;
      renderManager();
      sceneNameInput.focus();
    }

    function closeManager() {
      managerBackdrop.hidden = true;
    }

    function addScene() {
      const name = window.prompt("新场景名称", "新场景");
      if (!name || !name.trim()) return;
      const key = makeSceneKey(name);
      scenes[key] = { name: name.trim().slice(0, 24), tint: nextTint(), answers: [] };
      managerSceneKey = key;
      refreshSceneSelect();
      switchScene(key);
      managerBackdrop.hidden = false;
      renderManager();
    }

    function renameScene() {
      const scene = scenes[managerSceneKey];
      if (!scene) return;
      const nextName = sceneNameInput.value.trim().slice(0, 24);
      if (!nextName) return;
      scene.name = nextName;
      refreshSceneSelect();
      renderManager();
      if (managerSceneKey === state.activeScene) {
        state.status = nextName;
        statusEl.textContent = nextName;
      }
    }

    function deleteScene() {
      if (Object.keys(scenes).length <= 1) {
        state.status = "至少保留一个场景";
        statusEl.textContent = state.status;
        return;
      }
      const scene = scenes[managerSceneKey];
      if (!scene || !window.confirm(`删除“${scene.name}”？`)) return;
      delete scenes[managerSceneKey];
      managerSceneKey = firstSceneKey();
      refreshSceneSelect();
      switchScene(managerSceneKey);
      managerBackdrop.hidden = false;
      renderManager();
    }

    function addAnswer() {
      const scene = scenes[managerSceneKey];
      const value = newAnswerInput.value.trim();
      if (!scene || !value) return;
      scene.answers.push(value);
      newAnswerInput.value = "";
      renderManager();
    }

    function restoreDefaults() {
      if (!window.confirm("恢复默认答案？当前未保存或已保存的自定义内容都会被替换。")) return;
      scenes = cloneScenes(defaultScenes);
      state.activeScene = "general";
      managerSceneKey = "general";
      localStorage.removeItem(STORAGE_KEY);
      resetInteractionState();
      createBalls({ animate: true });
      refreshSceneSelect();
      renderManager();
      state.status = scenes.general.name;
      statusEl.textContent = state.status;
    }

    function setupSceneManager() {
      manageButton.addEventListener("click", openManager);
      closeManagerButton.addEventListener("click", closeManager);
      managerBackdrop.addEventListener("click", (event) => {
        if (event.target === managerBackdrop) closeManager();
      });
      managerSceneSelect.addEventListener("change", () => {
        managerSceneKey = managerSceneSelect.value;
        switchScene(managerSceneKey);
        managerBackdrop.hidden = false;
        renderManager();
      });
      renameSceneButton.addEventListener("click", renameScene);
      sceneNameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") renameScene();
      });
      addSceneButton.addEventListener("click", addScene);
      deleteSceneButton.addEventListener("click", deleteScene);
      addAnswerButton.addEventListener("click", addAnswer);
      newAnswerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") addAnswer();
      });
      answerList.addEventListener("input", (event) => {
        if (!event.target.classList.contains("answer-input")) return;
        const scene = scenes[managerSceneKey];
        const index = Number(event.target.dataset.index);
        if (!scene || !Number.isInteger(index)) return;
        scene.answers[index] = event.target.value;
      });
      answerList.addEventListener("click", (event) => {
        if (!event.target.classList.contains("answer-delete")) return;
        const scene = scenes[managerSceneKey];
        const index = Number(event.target.dataset.index);
        if (!scene || !Number.isInteger(index)) return;
        scene.answers.splice(index, 1);
        renderManager();
      });
      saveScenesButton.addEventListener("click", () => {
        renameScene();
        saveScenes();
        refreshSceneSelect();
        renderManager();
      });
      restoreDefaultButton.addEventListener("click", restoreDefaults);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !managerBackdrop.hidden) closeManager();
      });
    }

    function updateCameraCard() {
      modeStatus.textContent = state.modelReady ? "手势模式已开启" : "点击模式";
      cameraStatus.textContent = state.cameraReady ? "摄像头识别中" : "摄像头未开启";
    }

    function setupCameraCard() {
      updateCameraCard();
      cameraToggle.addEventListener("click", () => {
        const expanded = !cameraCard.classList.contains("is-expanded");
        cameraCard.classList.toggle("is-expanded", expanded);
        cameraToggle.textContent = expanded ? "隐藏预览" : "预览选择";
      });
    }

    function updateFullscreenButton() {
      fullscreenButton.textContent = document.fullscreenElement ? "退出全屏" : "全屏";
    }

    function setupFullscreen() {
      updateFullscreenButton();
      fullscreenButton.addEventListener("click", async () => {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else {
            await document.documentElement.requestFullscreen();
          }
        } catch (error) {
          state.status = "当前浏览器无法切换全屏";
          statusEl.textContent = state.status;
        }
      });
      document.addEventListener("fullscreenchange", updateFullscreenButton);
    }

    function renderShareCard(record) {
      shareScene.textContent = record.sceneName;
      shareDateTime.textContent = `${record.date} ${record.time}`;
      shareAnswer.textContent = record.answer;
      shareSource.textContent = `来源：${record.source}`;
    }

    function openShareModal() {
      if (!state.currentDrawRecord) return;
      renderShareCard(state.currentDrawRecord);
      shareBackdrop.hidden = false;
    }

    function closeShareModal() {
      shareBackdrop.hidden = true;
    }

    function shareFileName(record) {
      const safeScene = record.sceneName.replace(/[\\/:*?"<>|\s]+/g, "-").slice(0, 24);
      const safeTime = `${record.date}-${record.time}`.replace(/[\\/:*?"<>|\s]+/g, "-");
      return `一纸决定-${safeScene}-${safeTime}.png`;
    }

    async function exportShareCardBlob() {
      if (!window.html2canvas) throw new Error("html2canvas 未加载");
      const canvas = await window.html2canvas(shareCard, {
        backgroundColor: null,
        scale: Math.max(2, window.devicePixelRatio || 1),
        useCORS: true
      });
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("图片生成失败"));
        }, "image/png");
      });
    }

    async function saveShareImage() {
      try {
        const record = state.currentDrawRecord;
        const blob = await exportShareCardBlob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = shareFileName(record);
        link.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        state.status = "分享卡片生成失败";
        statusEl.textContent = state.status;
      }
    }

    async function systemShareImage() {
      try {
        const record = state.currentDrawRecord;
        const blob = await exportShareCardBlob();
        const file = new File([blob], shareFileName(record), { type: "image/png" });
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({
            title: "一纸决定",
            text: `${record.sceneName}：${record.answer}`,
            files: [file]
          });
        } else if (navigator.share) {
          await navigator.share({
            title: "一纸决定",
            text: `${record.sceneName}｜${record.date} ${record.time}\\n${record.answer}`
          });
        } else {
          state.status = "当前浏览器不支持系统分享";
          statusEl.textContent = state.status;
        }
      } catch (error) {
        if (error.name !== "AbortError") {
          state.status = "系统分享未完成";
          statusEl.textContent = state.status;
        }
      }
    }

    function setupShareActions() {
      redrawButton.addEventListener("click", redrawCurrentScene);
      shareCardButton.addEventListener("click", openShareModal);
      closeShareButton.addEventListener("click", closeShareModal);
      saveShareButton.addEventListener("click", saveShareImage);
      systemShareButton.addEventListener("click", systemShareImage);
      shareBackdrop.addEventListener("click", (event) => {
        if (event.target === shareBackdrop) closeShareModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !shareBackdrop.hidden) closeShareModal();
      });
    }

    function mapLandmark(point) {
      return {
        x: (1 - point.x) * state.width,
        y: point.y * state.height,
        z: point.z || 0
      };
    }

    function isFingerExtended(landmarks, tip, pip) {
      return landmarks[tip].y < landmarks[pip].y - 0.018;
    }

    function analyzeHand(landmarks) {
      const pts = landmarks.map(mapLandmark);
      const thumbIndex = normDist(landmarks, 4, 8);
      const thumbMiddle = normDist(landmarks, 4, 12);
      const indexMiddle = normDist(landmarks, 8, 12);
      const pinchScore = (thumbIndex + thumbMiddle + indexMiddle) / 3;
      const pinchGap = Math.max(thumbIndex, thumbMiddle, indexMiddle);
      const fingers = [
        isFingerExtended(landmarks, 8, 6),
        isFingerExtended(landmarks, 12, 10),
        isFingerExtended(landmarks, 16, 14),
        isFingerExtended(landmarks, 20, 18)
      ];
      const extendedCount = fingers.filter(Boolean).length;
      const palm = pts[0];
      const index = pts[8];
      const middle = pts[12];
      const thumb = pts[4];
      const centroid = {
        x: (thumb.x + index.x + middle.x) / 3,
        y: (thumb.y + index.y + middle.y) / 3
      };
      return {
        pts,
        palm,
        index,
        middle,
        thumb,
        centroid,
        pinch: pinchScore < 0.072 && pinchGap < 0.108,
        pinchRelaxed: pinchScore < 0.12 && pinchGap < 0.165,
        pinchScore,
        pinchGap,
        openPalm: extendedCount >= 4 && pinchScore > 0.14,
        extendedCount
      };
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "user"
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        state.cameraReady = true;
        updateCameraCard();
        permission.classList.remove("is-visible");
        statusEl.textContent = "正在加载手势模型...";
        await startHandModel();
      } catch (error) {
        permission.classList.add("is-visible");
        state.status = "鼠标预览模式";
        state.cameraReady = false;
        state.modelReady = false;
        updateCameraCard();
        statusEl.textContent = "鼠标预览模式";
      }
    }

    async function startHandModel() {
      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );
        const createLandmarker = (delegate) => HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath:
              "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate
          },
          runningMode: "VIDEO",
          numHands: 2,
          minHandDetectionConfidence: 0.55,
          minHandPresenceConfidence: 0.55,
          minTrackingConfidence: 0.55
        });
        let handLandmarker;
        try {
          handLandmarker = await createLandmarker("GPU");
        } catch (gpuError) {
          handLandmarker = await createLandmarker("CPU");
        }
        state.modelReady = true;
        updateCameraCard();
        state.status = "等待手势";
        statusEl.textContent = state.status;
        detectHands(handLandmarker);
      } catch (error) {
        permission.classList.add("is-visible");
        state.status = "模型加载失败";
        state.modelReady = false;
        updateCameraCard();
        statusEl.textContent = "模型加载失败";
      }
    }

    let lastVideoTime = -1;
    function detectHands(handLandmarker) {
      if (video.currentTime !== lastVideoTime && state.cameraReady) {
        lastVideoTime = video.currentTime;
        const result = handLandmarker.detectForVideo(video, performance.now());
        state.previousHands = state.hands;
        state.previousHand = state.hand;
        state.hands = result.landmarks?.length ? result.landmarks.map(analyzeHand) : [];
        state.hand = state.hands[0] || null;
      }
      requestAnimationFrame(() => detectHands(handLandmarker));
    }

    function currentPointer() {
      if (state.hand) {
        const crossed = areHandsCrossed();
        return {
          active: true,
          index: state.hand.index,
          pinchPoint: state.hand.centroid,
          palm: state.hand.palm,
          pinch: crossed ? false : state.hand.pinch,
          pinchRelaxed: crossed ? false : state.hand.pinchRelaxed,
          openPalm: crossed ? false : state.hand.openPalm,
          label: crossed ? "双手交叉" : state.hand.pinch ? "三指捏合" : state.hand.openPalm ? "张开后挥散" : "选择"
        };
      }

      if (state.mouse.active) {
        return {
          active: true,
          index: { x: state.mouse.x, y: state.mouse.y },
          pinchPoint: { x: state.mouse.x, y: state.mouse.y },
          palm: { x: state.mouse.x, y: state.mouse.y },
          pinch: state.mouse.down,
          pinchRelaxed: state.mouse.down,
          openPalm: false,
          label: state.mouse.down ? "预览捏合" : "预览选择"
        };
      }

      return { active: false, label: state.status };
    }

    function handSpan(hand) {
      return Math.max(52, dist(hand.pts[0], hand.pts[9]) * 2.4);
    }

    function areHandsCrossed() {
      if (state.hands.length < 2) return false;
      const [a, b] = state.hands;
      const scale = Math.max(handSpan(a), handSpan(b));
      const palmDistance = dist(a.palm, b.palm);
      const tipsToOtherPalm = (
        dist(a.pts[8], b.palm) +
        dist(a.pts[12], b.palm) +
        dist(a.pts[16], b.palm) +
        dist(b.pts[8], a.palm) +
        dist(b.pts[12], a.palm) +
        dist(b.pts[16], a.palm)
      ) / 6;
      const thumbCross = Math.min(dist(a.thumb, b.index), dist(b.thumb, a.index));
      const indexCross = Math.min(dist(a.index, b.palm), dist(b.index, a.palm));
      return palmDistance < scale * 1.12 && tipsToOtherPalm < scale * 1.18 && (thumbCross < scale * 1.28 || indexCross < scale * 0.92);
    }

    function startTrashSequence(ball) {
      if (!ball || state.trash) return;
      const bin = trashBinTarget();
      state.trash = {
        ball,
        progress: 0,
        startX: ball.x,
        startY: ball.y,
        startAngle: ball.angle,
        targetX: bin.x,
        targetY: bin.y - bin.h * 0.28
      };
      ball.trashing = true;
      ball.settled = false;
      ball.settleFrames = 0;
      ball.air = 0;
      ball.airVelocity = 0;
      state.opened = null;
      state.grabbed = null;
      state.selected = null;
      state.actionHover = null;
      state.actionHoverSince = 0;
      redrawButton.classList.remove("is-gesture-hover");
      shareCardButton.classList.remove("is-gesture-hover");
      answerActions.hidden = true;
      state.centerConfirmProgress = 0;
      state.trashShake = 1;
      state.trashCooldownUntil = performance.now() + 1100;
    }

    function trashBinTarget() {
      const size = clamp(Math.min(state.width, state.height) * 0.15, 86, 128);
      return {
        x: state.width - size * 0.72,
        y: state.height - size * 0.52,
        w: size * 0.78,
        h: size
      };
    }

    function centerConfirmZone() {
      const size = Math.min(state.width, state.height);
      return {
        x: state.width * 0.5,
        y: state.height * 0.48,
        r: clamp(size * 0.135, 86, 138)
      };
    }

    function isInCenterConfirmZone(ball) {
      if (!ball) return false;
      const zone = centerConfirmZone();
      return Math.hypot(ball.x - zone.x, ball.y - zone.y) < zone.r * 0.62;
    }

    function openBall(ball) {
      if (!ball || ball.hidden || ball.trashing) return;
      ball.note = randomSceneAnswer();
      ball.open = Math.max(ball.open, 0.16);
      state.opened = ball;
      state.grabbed = ball;
      state.centerConfirmProgress = 1;
      state.currentDrawRecord = createDrawRecord(ball.note);
      saveDrawHistory(state.currentDrawRecord);
      answerActions.hidden = false;
    }

    function createDrawRecord(answer) {
      const now = new Date();
      const date = now.toLocaleDateString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit" });
      const time = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      return {
        id: `draw-${now.getTime()}-${Math.random().toString(16).slice(2, 8)}`,
        date,
        time,
        sceneName: currentScene().name,
        answer,
        source: "一纸决定"
      };
    }

    function saveDrawHistory(record) {
      try {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        history.unshift(record);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 20)));
      } catch (error) {
        localStorage.removeItem(HISTORY_KEY);
      }
    }

    function redrawCurrentScene() {
      resetInteractionState();
      answerActions.hidden = true;
      redrawButton.classList.remove("is-gesture-hover");
      shareCardButton.classList.remove("is-gesture-hover");
      shareBackdrop.hidden = true;
      createBalls({ animate: true });
    }

    function answerActionAt(point) {
      if (!point || answerActions.hidden || !state.opened || state.trash) return null;
      const buttons = [redrawButton, shareCardButton];
      const pad = 34;
      return buttons.find((button) => {
        const rect = button.getBoundingClientRect();
        return (
          point.x >= rect.left - pad &&
          point.x <= rect.right + pad &&
          point.y >= rect.top - pad &&
          point.y <= rect.bottom + pad
        );
      }) || null;
    }

    function updateAnswerActionGesture(pointer) {
      const canUseActions =
        pointer.active &&
        state.opened &&
        !state.trash &&
        managerBackdrop.hidden &&
        shareBackdrop.hidden;

      if (!canUseActions) {
        state.actionHover = null;
        state.actionHoverSince = 0;
        redrawButton.classList.remove("is-gesture-hover");
        shareCardButton.classList.remove("is-gesture-hover");
        return;
      }

      const button =
        answerActionAt(pointer.pinchPoint) ||
        answerActionAt(pointer.index);
      const now = performance.now();
      if (button !== state.actionHover) {
        state.actionHover = button;
        state.actionHoverSince = button ? now : 0;
      }
      const hoverDuration = button ? now - state.actionHoverSince : 0;
      const holdingActionPinch = Boolean(pointer.pinch || pointer.pinchRelaxed);
      state.actionHover = button;
      redrawButton.classList.toggle("is-gesture-hover", button === redrawButton);
      shareCardButton.classList.toggle("is-gesture-hover", button === shareCardButton);

      const canTriggerAgain = now - state.actionLastTriggeredAt > 900;
      const pinchConfirmed = holdingActionPinch && hoverDuration >= 200;
      const hoverConfirmed = hoverDuration >= 600;
      if (button && canTriggerAgain && (pinchConfirmed || hoverConfirmed)) {
        state.actionLastTriggeredAt = now;
        button.click();
        state.actionHover = null;
        state.actionHoverSince = 0;
        redrawButton.classList.remove("is-gesture-hover");
        shareCardButton.classList.remove("is-gesture-hover");
      }
    }

    function selectBall(pointer) {
      if (!pointer.active || state.opened) return null;
      if (state.selected && !state.selected.hidden && !state.selected.trashing && state.selected.open <= 0.02) {
        const currentDistance = Math.hypot(state.selected.x - pointer.index.x, state.selected.y - pointer.index.y);
        const stickyReach = state.selected.r + Math.min(state.width, state.height) * 0.095;
        if (currentDistance < stickyReach) return state.selected;
      }
      let nearest = null;
      let nearestDistance = Infinity;
      for (const ball of state.balls) {
        if (ball.hidden || ball.trashing) continue;
        if (ball.open > 0.02) continue;
        const indexDistance = Math.hypot(ball.x - pointer.index.x, ball.y - pointer.index.y);
        const pinchDistance = pointer.pinchPoint ? Math.hypot(ball.x - pointer.pinchPoint.x, ball.y - pointer.pinchPoint.y) : indexDistance;
        const d = Math.min(indexDistance, pinchDistance);
        const reach = ball.r + Math.min(state.width, state.height) * (pointer.pinch ? 0.12 : 0.075);
        if (d < reach && d < nearestDistance) {
          nearest = ball;
          nearestDistance = d;
        }
      }
      return nearest;
    }

    function applyOpenPalmForce(pointer, dt) {
      if (!pointer.active || !pointer.openPalm) return;
      const now = performance.now();
      if (now > state.openPalmBlastUntil) return;
      const strength = now - state.lastBlastAt > 90 ? 1 : 0.35;
      state.lastBlastAt = now;
      for (const ball of state.balls) {
        if (ball.open > 0.02) continue;
        const dx = ball.x - pointer.index.x;
        const dy = ball.y - pointer.index.y;
        const d = Math.max(24, Math.hypot(dx, dy));
        const radius = Math.min(state.width, state.height) * 0.38;
        if (d < radius) {
          const falloff = (1 - d / radius) ** 1.9;
          const force = falloff * strength * dt * 0.34;
          ball.settled = false;
          ball.settleFrames = 0;
          ball.vx += (dx / d) * force + (Math.random() - 0.5) * 0.08;
          ball.vy += (dy / d) * force + (Math.random() - 0.5) * 0.08;
          ball.spin += (Math.random() - 0.5) * 0.004;
        }
      }
    }

    function detectOpenPalmWave(pointer, dt, now, gestureLocked) {
      const cooldown = 2400;
      const canTrack =
        !gestureLocked &&
        pointer.active &&
        pointer.openPalm &&
        !pointer.pinch &&
        !state.grabbed &&
        !state.opened &&
        !state.actionHover;

      if (!canTrack) {
        state.openPalmSince = 0;
        state.openPalmLastPoint = null;
        return false;
      }

      const point = pointer.palm || pointer.index;
      if (!state.openPalmSince || !state.openPalmLastPoint) {
        state.openPalmSince = now;
        state.openPalmLastPoint = { x: point.x, y: point.y };
        return false;
      }

      const dx = point.x - state.openPalmLastPoint.x;
      const dy = point.y - state.openPalmLastPoint.y;
      const move = Math.hypot(dx, dy);
      const speed = move / Math.max(dt, 16) * 1000;
      const held = now - state.openPalmSince;
      state.openPalmLastPoint = { x: point.x, y: point.y };

      const outX = point.x - state.width * 0.5;
      const outY = point.y - state.height * 0.48;
      const outDistance = Math.max(1, Math.hypot(outX, outY));
      const directionScore = move > 0 ? (dx * outX + dy * outY) / (move * outDistance) : 0;
      const outwardSwipe = directionScore > 0.22 && move > 16;
      const pushSwipe = dy > 22 && speed > 560;
      const decisiveSwipe = move > 38 && speed > 760;

      return (
        held >= 320 &&
        now - state.lastThrowAt >= cooldown &&
        speed >= 680 &&
        (outwardSwipe || pushSwipe || decisiveSwipe)
      );
    }

    function scatterTargetFor(index, total, origin) {
      const angle = index * 2.399963 + Math.sin(index * 17.1) * 0.28;
      const ring = Math.sqrt((index + 0.8) / total);
      const rx = state.width * 0.42;
      const ry = state.height * 0.33;
      return {
        x: clamp(origin.x + Math.cos(angle) * ring * rx + (Math.random() - 0.5) * 80, 70, state.width - 70),
        y: clamp(origin.y + Math.sin(angle) * ring * ry + (Math.random() - 0.5) * 66, 96, state.height - 68)
      };
    }

    function throwPaperBalls(pointer) {
      if (state.opened) return;
      const now = performance.now();
      if (now - state.lastThrowAt < 2400) return;
      state.lastThrowAt = now;
      state.grabbed = null;
      const origin = pointer.index || { x: state.width * 0.5, y: state.height * 0.46 };
      state.balls.forEach((ball, index) => {
        if (ball.hidden || ball.trashing || ball.open > 0.02) return;
        const target = scatterTargetFor(index, state.balls.length, origin);
        const startX = clamp(origin.x + (Math.random() - 0.5) * 150, ball.r + 20, state.width - ball.r - 20);
        const startY = clamp(origin.y - 16 + (Math.random() - 0.5) * 110, ball.r + 74, state.height - ball.r - 24);
        ball.x = lerp(ball.x, startX, 0.72);
        ball.y = lerp(ball.y, startY, 0.72);
        ball.baseX = target.x;
        ball.baseY = target.y;
        const dx = target.x - ball.x;
        const dy = target.y - ball.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        ball.vx += (dx / d) * (8.0 + Math.random() * 5.0) + (Math.random() - 0.5) * 3.2;
        ball.vy += (dy / d) * (7.0 + Math.random() * 4.4) + (Math.random() - 0.5) * 2.8;
        ball.spin += (Math.random() - 0.5) * 0.22;
        ball.lift = 0;
        ball.air = Math.max(ball.air, 105 + Math.random() * 135);
        ball.airVelocity = -0.115 - Math.random() * 0.085;
        ball.settled = false;
        ball.settleFrames = 0;
      });
    }

    function update(dt) {
      const now = performance.now();
      const pointer = currentPointer();
      updateAnswerActionGesture(pointer);
      const crossed = areHandsCrossed();
      if (crossed && state.opened) startTrashSequence(state.opened);
      state.wasClasped = crossed;

      if (state.trash) {
        const item = state.trash;
        const ball = item.ball;
        item.progress = Math.min(1, item.progress + dt * 0.0015);
        const p = item.progress;
        const close = clamp(p / 0.24, 0, 1);
        const fly = clamp((p - 0.16) / 0.84, 0, 1);
        if (fly > 0.78) state.trashShake = Math.max(state.trashShake, (fly - 0.78) / 0.22);
        const arc = Math.sin(fly * Math.PI);
        ball.open = 1 - close;
        ball.x = lerp(item.startX, item.targetX, 1 - (1 - fly) ** 3);
        ball.y = lerp(item.startY, item.targetY, fly) - arc * 120;
        ball.angle = item.startAngle + fly * Math.PI * 2.2;
        ball.lift = lerp(ball.lift, 0.18, 0.18);
        ball.air = 0;
        ball.vx = 0;
        ball.vy = 0;
        ball.spin = 0;
        ball.trashScale = lerp(1, 0.36, fly);
        if (p >= 1) {
          ball.open = 0;
          ball.hidden = true;
          ball.trashing = false;
          state.trash = null;
          state.trashShake = 0.8;
          state.selected = null;
          state.grabbed = null;
          state.opened = null;
          state.trashCooldownUntil = now + 900;
        }
      }

      const gestureLocked = state.trash || crossed || Boolean(state.opened) || now < state.trashCooldownUntil;

      const openPalmWave = detectOpenPalmWave(pointer, dt, now, gestureLocked);
      if (openPalmWave) {
        state.openPalmBlastUntil = now + 420;
        state.openPalmSince = 0;
        state.openPalmLastPoint = null;
        throwPaperBalls(pointer);
      }
      state.wasOpenPalm = pointer.active && pointer.openPalm;

      state.selected = gestureLocked ? null : (state.grabbed || selectBall(pointer));
      if (!gestureLocked) applyOpenPalmForce(pointer, dt);

      for (const ball of state.balls) {
        ball.highlight = lerp(ball.highlight, ball === state.selected ? 1 : 0, 0.18);
        if (!state.opened && ball === state.selected && ball !== state.grabbed) {
          ball.lift = lerp(ball.lift, 0.46, 0.13);
        }
      }

      if (!gestureLocked && state.selected && pointer.active && !pointer.pinch && !pointer.openPalm && !state.opened) {
        state.selected.vx *= 0.82;
        state.selected.vy *= 0.82;
        state.selected.spin *= 0.84;
      }

      if (!gestureLocked && pointer.active && pointer.pinch && state.selected && !state.grabbed && !state.opened) {
        state.grabbed = state.selected;
        state.pinchStartedAt = performance.now();
        state.centerConfirmProgress = 0;
        state.grabbed.open = 0;
      }

      if (state.grabbed && !state.opened) {
        const ball = state.grabbed;
        const holdingPinch = pointer.active && (pointer.pinch || pointer.pinchRelaxed);
        if (holdingPinch) {
          const targetX = pointer.pinchPoint.x;
          const targetY = Math.min(pointer.pinchPoint.y - 34, state.height * 0.58);
          ball.x = lerp(ball.x, targetX, pointer.pinch ? 0.34 : 0.24);
          ball.y = lerp(ball.y, targetY, pointer.pinch ? 0.34 : 0.24);
          ball.vx *= 0.18;
          ball.vy *= 0.18;
          ball.lift = lerp(ball.lift, pointer.pinch ? 1.16 : 0.94, 0.18);
          ball.air = lerp(ball.air, 0, 0.3);
          ball.airVelocity = 0;
          ball.settled = false;
          ball.settleFrames = 0;
          if (pointer.pinch && isInCenterConfirmZone(ball)) {
            const zone = centerConfirmZone();
            state.centerConfirmProgress = Math.min(1, state.centerConfirmProgress + dt * 0.004);
            ball.x = lerp(ball.x, zone.x, 0.08);
            ball.y = lerp(ball.y, zone.y, 0.08);
            if (state.centerConfirmProgress >= 1) {
              openBall(ball);
            }
          } else {
            state.centerConfirmProgress = Math.max(0, state.centerConfirmProgress - dt * 0.003);
          }
        } else {
          if (isInCenterConfirmZone(ball) && state.centerConfirmProgress > 0.72) {
            openBall(ball);
          } else {
            ball.lift = lerp(ball.lift, 0, 0.12);
            state.grabbed = null;
            state.centerConfirmProgress = 0;
          }
        }
      }

      if (state.opened) {
        const ball = state.opened;
        ball.open = Math.min(1, ball.open + dt * 0.0012);
        ball.lift = lerp(ball.lift, 1, 0.1);
      }
      state.trashShake = Math.max(0, state.trashShake - dt * 0.0028);

      for (const ball of state.balls) {
        if (ball.hidden || ball.trashing || ball === state.grabbed || ball.open > 0.02) continue;
        if (ball.settled && ball.air === 0 && !pointer.openPalm) {
          ball.highlight = lerp(ball.highlight, ball === state.selected ? 1 : 0, 0.18);
          continue;
        }
        const home = ball.air > 0 ? 0 : state.selected === ball ? 0.00025 : 0.00045;
        ball.vx += (ball.baseX - ball.x) * home * dt;
        ball.vy += (ball.baseY - ball.y) * home * dt;
        ball.x += ball.vx * dt * 0.04;
        ball.y += ball.vy * dt * 0.04;
        ball.angle += ball.spin * dt * 0.04;
        if (ball.air > 0 || Math.abs(ball.airVelocity) > 0.0001) {
          ball.air += ball.airVelocity * dt;
          ball.airVelocity -= 0.00072 * dt;
          if (ball.air <= 0) {
            ball.air = 0;
            if (Math.abs(ball.airVelocity) > 0.14) {
              ball.airVelocity = -ball.airVelocity * 0.10;
              ball.vx *= 0.62;
              ball.vy *= 0.62;
              ball.spin += (Math.random() - 0.5) * 0.025;
            } else {
              ball.airVelocity = 0;
            }
          }
        }
        ball.lift = lerp(ball.lift, 0, 0.045);
        const friction = ball.air > 0 ? 0.986 : 0.90;
        ball.vx *= friction;
        ball.vy *= friction;
        ball.spin *= ball.air > 0 ? 0.96 : 0.88;

        const minX = ball.r + 14;
        const maxX = state.width - ball.r - 14;
        const minY = ball.r + 62;
        const maxY = state.height - ball.r - 14;
        if (ball.x < minX || ball.x > maxX) {
          ball.x = clamp(ball.x, minX, maxX);
          ball.vx *= -0.38;
          ball.spin += ball.vy * 0.003;
        }
        if (ball.y < minY || ball.y > maxY) {
          ball.y = clamp(ball.y, minY, maxY);
          ball.vy *= -0.38;
          ball.spin += ball.vx * 0.003;
        }

        const isOnTable = ball.air === 0 && Math.abs(ball.airVelocity) < 0.0001;
        const speed = Math.hypot(ball.vx, ball.vy);
        const closeToHome = Math.hypot(ball.baseX - ball.x, ball.baseY - ball.y) < 9;
        if (isOnTable && speed < 0.045 && Math.abs(ball.spin) < 0.0035 && closeToHome) {
          ball.settleFrames += 1;
          if (ball.settleFrames > 10) {
            ball.vx = 0;
            ball.vy = 0;
            ball.spin = 0;
            ball.lift = 0;
            ball.baseX = ball.x;
            ball.baseY = ball.y;
            ball.settled = true;
          }
        } else {
          ball.settleFrames = 0;
        }
      }

      const nextStatus = pointer.active ? pointer.label : state.status;
      if (statusEl.textContent !== nextStatus) statusEl.textContent = nextStatus;
    }

    function drawBackground(time) {
      const w = state.width;
      const h = state.height;
      if (textures.wood.complete && textures.wood.naturalWidth) {
        const img = textures.wood;
        const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
        const dw = img.naturalWidth * scale;
        const dh = img.naturalHeight * scale;
        const dx = (w - dw) / 2;
        const dy = (h - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      } else {
        const gradient = ctx.createLinearGradient(0, 0, w, h);
        gradient.addColorStop(0, "#a87542");
        gradient.addColorStop(0.45, "#85582e");
        gradient.addColorStop(1, "#4c2f1d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
      }

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.12;
      const light = ctx.createRadialGradient(w * 0.18, h * 0.08, 0, w * 0.18, h * 0.08, Math.max(w, h) * 0.72);
      light.addColorStop(0, "rgba(255, 220, 160, 0.85)");
      light.addColorStop(0.36, "rgba(255, 190, 105, 0.24)");
      light.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = light;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.18;
      const vignette = ctx.createRadialGradient(w * 0.5, h * 0.42, h * 0.18, w * 0.5, h * 0.5, h * 0.86);
      vignette.addColorStop(0, "rgba(255,255,255,0.05)");
      vignette.addColorStop(1, "rgba(0,0,0,0.92)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function paperPath(radius, folds, open) {
      const points = [];
      const count = folds || 18;
      for (let i = 0; i < count; i++) {
        const t = (i / count) * Math.PI * 2;
        const wrinkle = Math.sin(t * 3.1) * 0.07 + Math.cos(t * 5.3) * 0.055;
        const r = radius * (1 + wrinkle * (1 - open * 0.8));
        points.push({ x: Math.cos(t) * r, y: Math.sin(t) * r });
      }
      return points;
    }

    function traceIrregularBall(radius, seed, open = 0) {
      const count = 34;
      const wobble = 1 - open * 0.55;
      ctx.beginPath();
      for (let i = 0; i <= count; i++) {
        const t = (i / count) * Math.PI * 2;
        const wrinkle =
          Math.sin(t * 3.7 + seed) * 0.055 +
          Math.cos(t * 7.1 + seed * 0.37) * 0.035 +
          Math.sin(t * 11.0 + seed * 0.2) * 0.022;
        const r = radius * (1 + wrinkle * wobble);
        const x = Math.cos(t) * r;
        const y = Math.sin(t) * r * (0.96 + Math.sin(seed) * 0.035);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function drawBallTexture(ball, radius) {
      if (!textures.ball.complete || !textures.ball.naturalWidth) return false;
      const img = textures.ball;
      const side = Math.min(img.naturalWidth, img.naturalHeight) * (0.66 / ball.textureZoom);
      const sx = img.naturalWidth * (0.5 + ball.textureX) - side / 2;
      const sy = img.naturalHeight * (0.52 + ball.textureY) - side / 2;
      const size = radius * 2.62;
      ctx.drawImage(img, sx, sy, side, side, -size / 2, -size / 2, size, size);
      return true;
    }

    function drawCrumpledBall(ball) {
      const r = ball.r;
      const air = ball.air || 0;
      const selectedScale = 1 + ball.highlight * 0.08;
      const scale = (ball.trashScale || 1) * selectedScale;
      ctx.save();
      ctx.translate(ball.x, ball.y - ball.lift * 22 - air);
      ctx.scale(scale, scale);
      ctx.rotate(ball.angle);

      ctx.save();
      ctx.translate(9 + ball.lift * 13 + air * 0.08, 16 + ball.lift * 22 + air);
      ctx.scale(1.14 + air * 0.0032, 0.46 + air * 0.0012);
      ctx.filter = `blur(${3 + air * 0.018}px)`;
      ctx.fillStyle = `rgba(0, 0, 0, ${clamp(0.34 + ball.lift * 0.18 - air * 0.0011, 0.10, 0.38)})`;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.filter = "none";
      ctx.restore();

      const glow = ball.highlight;
      if (glow > 0.02) {
        ctx.save();
        ctx.globalAlpha = glow * 0.40;
        ctx.fillStyle = "#ffe4a3";
        ctx.shadowColor = "#ffd98a";
        ctx.shadowBlur = 26;
        ctx.beginPath();
        ctx.arc(0, 0, r + 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = glow;
        ctx.strokeStyle = "rgba(255, 225, 154, 0.94)";
        ctx.lineWidth = 3.4;
        ctx.shadowColor = "#ffd98a";
        ctx.shadowBlur = 22;
        ctx.beginPath();
        ctx.arc(0, 0, r + 10, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      traceIrregularBall(r * 1.03, ball.seed, ball.open);
      const shell = new Path2D();
      const count = 34;
      for (let i = 0; i <= count; i++) {
        const t = (i / count) * Math.PI * 2;
        const wrinkle =
          Math.sin(t * 3.7 + ball.seed) * 0.055 +
          Math.cos(t * 7.1 + ball.seed * 0.37) * 0.035 +
          Math.sin(t * 11.0 + ball.seed * 0.2) * 0.022;
        const rr = r * 1.03 * (1 + wrinkle);
        const x = Math.cos(t) * rr;
        const y = Math.sin(t) * rr * (0.96 + Math.sin(ball.seed) * 0.035);
        if (i === 0) shell.moveTo(x, y);
        else shell.lineTo(x, y);
      }
      shell.closePath();

      ctx.fillStyle = "#f5f5f1";
      ctx.fill();

      ctx.save();
      ctx.clip(shell);
      const usedTexture = drawBallTexture(ball, r);
      if (!usedTexture) {
        const g = ctx.createRadialGradient(-r * 0.34, -r * 0.42, r * 0.08, 0, 0, r * 1.2);
        g.addColorStop(0, "#ffffff");
        g.addColorStop(0.42, "#eeeeea");
        g.addColorStop(0.78, "#cacaca");
        g.addColorStop(1, "#a7a7a7");
        ctx.fillStyle = g;
        ctx.fillRect(-r * 1.3, -r * 1.3, r * 2.6, r * 2.6);
      }

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.24;
      ctx.fillStyle = ball.tint || currentScene().tint;
      ctx.fillRect(-r * 1.4, -r * 1.4, r * 2.8, r * 2.8);

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.16;
      const shade = ctx.createRadialGradient(-r * 0.36, -r * 0.5, r * 0.08, r * 0.16, r * 0.22, r * 1.38);
      shade.addColorStop(0, "#ffffff");
      shade.addColorStop(0.46, "#d8d8d8");
      shade.addColorStop(1, "#595959");
      ctx.fillStyle = shade;
      ctx.fillRect(-r * 1.4, -r * 1.4, r * 2.8, r * 2.8);
      ctx.globalCompositeOperation = "source-over";

      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = "rgba(80, 80, 80, 0.34)";
      ctx.lineWidth = Math.max(0.7, r * 0.025);
      for (const crease of ball.crumple) {
        const a = crease.a + Math.sin(ball.seed + crease.d * 6) * 0.9;
        const d = crease.d * r * 0.86;
        const x = Math.cos(a) * d;
        const y = Math.sin(a) * d;
        const len = crease.len * r * 0.8;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a + Math.PI * 0.5);
        ctx.globalAlpha = crease.alpha * 0.65;
        ctx.beginPath();
        ctx.moveTo(-len * 0.5, 0);
        ctx.quadraticCurveTo(0, Math.sin(a * 4) * r * 0.08, len * 0.5, 0);
        ctx.stroke();
        ctx.restore();
      }

      ctx.globalAlpha = 0.28;
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = "#ffffff";
      for (let i = 0; i < 5; i++) {
        const a = ball.seed + i * 1.82;
        const x = Math.cos(a) * r * (0.12 + i * 0.06);
        const y = Math.sin(a * 1.3) * r * 0.34;
        ctx.beginPath();
        ctx.ellipse(x, y, r * (0.18 + i * 0.018), r * 0.075, a * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.46)";
      ctx.lineWidth = 1;
      ctx.stroke(shell);
      ctx.restore();

      ctx.clip();
      for (const crease of ball.crumple) {
        const a = crease.a + Math.sin(ball.seed + crease.d * 6) * 0.7;
        const d = crease.d * r;
        const x = Math.cos(a) * d;
        const y = Math.sin(a) * d;
        const len = crease.len * r;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a + Math.PI * 0.5);
        ctx.globalAlpha = crease.alpha;
        ctx.lineWidth = crease.w;
        ctx.strokeStyle = Math.sin(a * 2) > 0 ? "#fffaf0" : "#6d6254";
        ctx.beginPath();
        ctx.moveTo(-len * 0.5, 0);
        ctx.quadraticCurveTo(0, Math.sin(a * 4) * r * 0.08, len * 0.5, 0);
        ctx.stroke();
        ctx.restore();
      }

      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.ellipse(-r * 0.28, -r * 0.36, r * 0.23, r * 0.12, -0.55, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function updateGestureCursor(pointer) {
      const visible = pointer.active && !state.trash && managerBackdrop.hidden && shareBackdrop.hidden;
      gestureCursor.classList.toggle("is-visible", visible);
      if (!visible) {
        gestureCursor.classList.remove("is-hover", "is-grabbing");
        return;
      }

      const target = pointer.index || pointer.pinchPoint;
      gestureCursor.style.setProperty("--cursor-x", `${target.x}px`);
      gestureCursor.style.setProperty("--cursor-y", `${target.y}px`);
      gestureCursor.classList.toggle("is-hover", Boolean((state.selected && !state.grabbed) || state.actionHover));
      gestureCursor.classList.toggle("is-grabbing", Boolean(state.grabbed || pointer.pinch || state.actionHover));
    }

    function drawCenterConfirmZone() {
      if (state.opened || state.trash) return;
      const zone = centerConfirmZone();
      const p = state.centerConfirmProgress;
      const hasGrabbed = Boolean(state.grabbed);
      const near = hasGrabbed && isInCenterConfirmZone(state.grabbed);
      const strength = near ? 1 : hasGrabbed ? 0.62 : 0.22;
      ctx.save();
      ctx.translate(zone.x, zone.y);

      const glow = ctx.createRadialGradient(0, 0, zone.r * 0.08, 0, 0, zone.r * 1.28);
      glow.addColorStop(0, `rgba(111, 244, 224, ${0.16 + strength * 0.14})`);
      glow.addColorStop(0.46, `rgba(111, 244, 224, ${0.07 + strength * 0.09})`);
      glow.addColorStop(1, "rgba(111, 244, 224, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, zone.r * 1.28, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.24 + strength * 0.38;
      ctx.strokeStyle = near ? "rgba(94, 244, 223, 0.90)" : "rgba(158, 235, 224, 0.46)";
      ctx.lineWidth = near ? 4 : 3;
      ctx.shadowColor = "rgba(78, 239, 218, 0.28)";
      ctx.shadowBlur = near ? 22 : 10;
      ctx.beginPath();
      ctx.arc(0, 0, zone.r, 0, Math.PI * 2);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.globalAlpha = hasGrabbed ? 0.18 + p * 0.38 : 0.08;
      ctx.fillStyle = "rgba(89, 230, 211, 0.20)";
      ctx.beginPath();
      ctx.arc(0, 0, zone.r * (0.58 + p * 0.16), 0, Math.PI * 2);
      ctx.fill();

      if (p > 0.02) {
        ctx.globalAlpha = 0.95;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.88)";
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(0, 0, zone.r * 0.78, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p);
        ctx.stroke();
      }

      if (hasGrabbed) {
        ctx.globalAlpha = near ? 0.72 : 0.44;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-zone.r * 0.18, zone.r * 0.02);
        ctx.lineTo(-zone.r * 0.04, zone.r * 0.16);
        ctx.lineTo(zone.r * 0.24, -zone.r * 0.16);
        ctx.stroke();
      } else {
        const mainSize = clamp(Math.floor(zone.r * 0.14), 14, 18);
        const subSize = clamp(Math.floor(zone.r * 0.115), 12, 15);
        const firstRest = "捏合抓取纸团";
        ctx.globalAlpha = 0.74;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `650 ${mainSize}px ${FONT_UI}`;
        const strongWidth = ctx.measureText("三指").width;
        ctx.font = `450 ${mainSize}px ${FONT_UI}`;
        const restWidth = ctx.measureText(firstRest).width;
        const totalWidth = strongWidth + restWidth;
        const startX = -totalWidth / 2;
        ctx.textAlign = "left";
        ctx.font = `650 ${mainSize}px ${FONT_UI}`;
        ctx.fillStyle = "rgba(255, 226, 154, 0.94)";
        ctx.shadowColor = "rgba(255, 205, 111, 0.24)";
        ctx.shadowBlur = 10;
        ctx.fillText("三指", startX, -mainSize * 0.42);
        ctx.shadowBlur = 0;
        ctx.font = `450 ${mainSize}px ${FONT_UI}`;
        ctx.fillStyle = "rgba(248, 248, 240, 0.76)";
        ctx.fillText(firstRest, startX + strongWidth, -mainSize * 0.42);
        ctx.textAlign = "center";
        ctx.globalAlpha = 0.52;
        ctx.font = `400 ${subSize}px ${FONT_UI}`;
        ctx.fillStyle = "rgba(248, 248, 240, 0.66)";
        ctx.fillText("拖到这里打开", 0, mainSize * 0.95);
      }
      ctx.restore();
    }

    function traceSheetPath(w, h, seed, fold) {
      const edge = 12 + fold * 0.2;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + edge * 0.3, -h / 2 + Math.sin(seed) * edge);
      for (let i = 1; i <= 8; i++) {
        const x = -w / 2 + (w * i) / 8;
        const y = -h / 2 + Math.sin(seed + i * 1.4) * edge;
        ctx.lineTo(x, y);
      }
      for (let i = 1; i <= 5; i++) {
        const x = w / 2 + Math.sin(seed + i) * edge * 0.5;
        const y = -h / 2 + (h * i) / 5;
        ctx.lineTo(x, y);
      }
      for (let i = 8; i >= 0; i--) {
        const x = -w / 2 + (w * i) / 8;
        const y = h / 2 + Math.cos(seed + i * 1.2) * edge;
        ctx.lineTo(x, y);
      }
      for (let i = 5; i >= 0; i--) {
        const x = -w / 2 + Math.cos(seed + i) * edge * 0.55;
        const y = -h / 2 + (h * i) / 5;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    function roundedRectPath(x, y, w, h, radius) {
      const r = Math.min(radius, w * 0.5, h * 0.5);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function wrapText(text, maxWidth, font) {
      ctx.font = font;
      const chars = [...text];
      const lines = [];
      let line = "";
      for (const char of chars) {
        const test = line + char;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawOpenPaper(ball) {
      const t = ball.open;
      if (t <= 0.01) return;
      const ease = 1 - (1 - t) ** 3;
      const maxW = Math.min(state.width * 0.64, 560);
      const maxH = Math.min(state.height * 0.52, 360);
      const w = lerp(ball.r * 2.1, maxW, ease);
      const h = lerp(ball.r * 1.9, maxH, ease);
      const x = lerp(ball.x, state.width * 0.5, ease * 0.74);
      const y = lerp(ball.y - 20, state.height * 0.48, ease * 0.82);
      const rotate = ball.angle * (1 - ease) + Math.sin(ball.seed) * 0.03 * ease;
      const fold = Math.sin(ease * Math.PI) * 22;

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(ball.trashScale || 1, ball.trashScale || 1);
      ctx.rotate(rotate);

      ctx.save();
      ctx.translate(14, 22);
      ctx.globalAlpha = 0.28 * ease;
      ctx.fillStyle = "#000000";
      traceSheetPath(w, h, ball.seed + 8, fold);
      ctx.fill();
      ctx.restore();

      traceSheetPath(w, h, ball.seed, fold);

      const pg = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
      pg.addColorStop(0, "#ffffff");
      pg.addColorStop(0.52, "#f3f3f0");
      pg.addColorStop(1, "#ddddda");
      ctx.fillStyle = pg;
      ctx.fill();

      ctx.save();
      ctx.clip();
      if (textures.sheet.complete && textures.sheet.naturalWidth) {
        ctx.globalAlpha = 0.72;
        const img = textures.sheet;
        const sx = img.naturalWidth * 0.08;
        const sy = img.naturalHeight * 0.04;
        const sw = img.naturalWidth * 0.84;
        const sh = img.naturalHeight * 0.72;
        ctx.drawImage(img, sx, sy, sw, sh, -w / 2 - 8, -h / 2 - 8, w + 16, h + 16);
      } else {
        ctx.globalAlpha = 0.24;
        ctx.strokeStyle = "#a89e8d";
        ctx.lineWidth = 1;
        for (let i = -3; i <= 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-w / 2 + 26, i * h * 0.14);
          ctx.quadraticCurveTo(0, i * h * 0.14 + Math.sin(i + ball.seed) * 9, w / 2 - 28, i * h * 0.14 - 4);
          ctx.stroke();
        }
      }

      ctx.globalCompositeOperation = "multiply";
      ctx.lineCap = "round";
      for (let i = 0; i < 24; i++) {
        const a = ball.seed * 0.8 + i * 1.73;
        const x = -w * 0.47 + (((i * 53) % 100) / 100) * w * 0.94;
        const y = -h * 0.46 + (((i * 37) % 100) / 100) * h * 0.43;
        const len = w * (0.12 + ((i * 17) % 62) / 300);
        ctx.globalAlpha = i % 3 === 0 ? 0.11 : 0.07;
        ctx.strokeStyle = i % 4 === 0 ? "rgba(78, 78, 72, 0.54)" : "rgba(178, 178, 168, 0.68)";
        ctx.lineWidth = 0.9 + (i % 3) * 0.35;
        ctx.beginPath();
        ctx.moveTo(x - Math.cos(a) * len * 0.5, y - Math.sin(a) * len * 0.5);
        ctx.quadraticCurveTo(
          x + Math.sin(a) * 14,
          y - Math.cos(a) * 10,
          x + Math.cos(a) * len * 0.5,
          y + Math.sin(a) * len * 0.5
        );
        ctx.stroke();
      }

      for (let i = 0; i < 9; i++) {
        const x = -w * 0.48 + (((i * 29) % 100) / 100) * w * 0.96;
        const y = -h * 0.43 + (((i * 41) % 100) / 100) * h * 0.36;
        const size = w * (0.075 + (i % 4) * 0.018);
        ctx.globalAlpha = 0.045 + (i % 3) * 0.014;
        ctx.fillStyle = i % 2 ? "rgba(82, 82, 76, 0.72)" : "rgba(190, 190, 180, 0.78)";
        ctx.beginPath();
        ctx.moveTo(x, y - size * 0.46);
        ctx.lineTo(x + size * 0.58, y + size * 0.16);
        ctx.lineTo(x - size * 0.36, y + size * 0.44);
        ctx.closePath();
        ctx.fill();
      }

      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 12; i++) {
        const a = -0.9 + i * 0.18 + Math.sin(ball.seed + i) * 0.34;
        const x = -w * 0.48 + (((i * 67) % 100) / 100) * w * 0.96;
        const y = -h * 0.46 + (((i * 31) % 100) / 100) * h * 0.42;
        const len = h * (0.16 + (i % 4) * 0.03);
        ctx.globalAlpha = 0.075;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.86)";
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(x - Math.cos(a) * len * 0.45, y - Math.sin(a) * len * 0.45);
        ctx.lineTo(x + Math.cos(a) * len * 0.55, y + Math.sin(a) * len * 0.55);
        ctx.stroke();
      }

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.13;
      const topCrush = ctx.createLinearGradient(0, -h * 0.5, 0, h * 0.05);
      topCrush.addColorStop(0, "rgba(95, 95, 88, 0.22)");
      topCrush.addColorStop(0.34, "rgba(255, 255, 255, 0.04)");
      topCrush.addColorStop(0.66, "rgba(112, 112, 105, 0.16)");
      topCrush.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = topCrush;
      ctx.fillRect(-w / 2, -h / 2, w, h * 0.58);
      ctx.globalCompositeOperation = "source-over";

      ctx.globalAlpha = 0.20;
      ctx.lineWidth = 1.1;
      for (let i = 0; i < 18; i++) {
        const a = ball.seed + i * 2.17;
        const x = -w * 0.46 + ((i * 71) % 100) / 100 * w * 0.92;
        const y = -h * 0.42 + ((i * 47) % 100) / 100 * h * 0.84;
        const len = w * (0.10 + ((i * 19) % 70) / 360);
        ctx.strokeStyle = i % 3 === 0 ? "rgba(255,255,255,0.72)" : "rgba(86,86,86,0.34)";
        ctx.beginPath();
        ctx.moveTo(x - Math.cos(a) * len * 0.5, y - Math.sin(a) * len * 0.5);
        ctx.quadraticCurveTo(
          x + Math.sin(a) * 8,
          y - Math.cos(a) * 8,
          x + Math.cos(a) * len * 0.5,
          y + Math.sin(a) * len * 0.5
        );
        ctx.stroke();
      }

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 0.12;
      const paperShade = ctx.createLinearGradient(-w * 0.5, -h * 0.5, w * 0.5, h * 0.5);
      paperShade.addColorStop(0, "#ffffff");
      paperShade.addColorStop(0.55, "#d0d0d0");
      paperShade.addColorStop(1, "#8d8d8d");
      ctx.fillStyle = paperShade;
      ctx.fillRect(-w / 2, -h / 2, w, h);
      ctx.globalCompositeOperation = "source-over";

      ctx.globalAlpha = 0.24;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(-w * 0.28, -h * 0.5);
      ctx.quadraticCurveTo(-w * 0.08, -h * 0.06, -w * 0.36, h * 0.48);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(w * 0.3, -h * 0.48);
      ctx.quadraticCurveTo(w * 0.12, -h * 0.02, w * 0.34, h * 0.44);
      ctx.stroke();
      ctx.restore();

      if (ease > 0.62) {
        const textAlpha = clamp((ease - 0.62) / 0.28, 0, 1);
        const textLength = Array.from(String(ball.note).replace(/\s/g, "")).length;
        const targetSize = textLength < 10 ? 48 : textLength <= 16 ? 42 : 36;
        let fontSize = clamp(Math.min(targetSize, Math.floor(w / 11.4)), textLength > 16 ? 34 : 36, targetSize);
        let lines = wrapText(ball.note, w * 0.76, `600 ${fontSize}px ${FONT_ANSWER}`);
        if (lines.length > 3) {
          fontSize = Math.max(34, fontSize - 2);
          lines = wrapText(ball.note, w * 0.84, `600 ${fontSize}px ${FONT_ANSWER}`).slice(0, 3);
        }
        const lineHeight = fontSize * 1.45;
        ctx.save();
        ctx.globalAlpha = textAlpha;
        ctx.fillStyle = "#3B2B22";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `600 ${fontSize}px ${FONT_ANSWER}`;
        const startY = -(lines.length - 1) * lineHeight * 0.5;
        lines.forEach((line, i) => ctx.fillText(line, 0, startY + i * lineHeight));
        ctx.restore();
      }

      ctx.restore();
    }

    function drawTrashBin() {
      const bin = trashBinTarget();
      const x = bin.x;
      const y = bin.y;
      const w = bin.w;
      const h = bin.h;
      const activeDrop = Boolean(state.opened) && !state.trash;
      const shake = state.trashShake || 0;
      ctx.save();
      ctx.translate(x, y);
      if (shake > 0.01) {
        ctx.translate(Math.sin(performance.now() * 0.055) * 6 * shake, Math.cos(performance.now() * 0.061) * 3 * shake);
        ctx.rotate(Math.sin(performance.now() * 0.05) * 0.035 * shake);
      }
      ctx.scale(activeDrop ? 1.12 : 1, activeDrop ? 1.12 : 1);
      ctx.globalAlpha = activeDrop ? 0.98 : 0.86;

      ctx.save();
      ctx.translate(6, h * 0.42);
      ctx.scale(1.2, 0.42);
      ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
      ctx.beginPath();
      ctx.arc(0, 0, w * 0.48, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const bodyPath = () => {
        ctx.beginPath();
        ctx.moveTo(-w * 0.46, -h * 0.36);
        ctx.lineTo(-w * 0.34, h * 0.36);
        ctx.quadraticCurveTo(0, h * 0.48, w * 0.34, h * 0.36);
        ctx.lineTo(w * 0.46, -h * 0.36);
        ctx.closePath();
      };

      if (activeDrop || state.trash) {
        ctx.save();
        ctx.globalAlpha = activeDrop ? 0.72 : 0.48;
        ctx.strokeStyle = "rgba(255, 219, 137, 0.94)";
        ctx.lineWidth = activeDrop ? 5 : 4;
        ctx.shadowColor = "rgba(255, 211, 117, 0.72)";
        ctx.shadowBlur = activeDrop ? 28 : 18;
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.38, w * 0.55, h * 0.13, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = activeDrop ? 0.24 : 0.12;
        ctx.fillStyle = "rgba(255, 212, 121, 0.42)";
        ctx.shadowColor = "rgba(255, 211, 117, 0.62)";
        ctx.shadowBlur = 28;
        ctx.beginPath();
        ctx.ellipse(0, -h * 0.38, w * 0.62, h * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.save();
      bodyPath();
      ctx.clip();
      ctx.globalAlpha = 0.82;
      ctx.fillStyle = "rgba(37, 31, 25, 0.20)";
      ctx.fillRect(-w * 0.48, -h * 0.34, w * 0.96, h * 0.86);

      const drawMiniTrashBall = (scrap) => {
        ctx.save();
        ctx.translate(scrap.x * w, scrap.y * h);
        ctx.rotate(scrap.a);
        const sr = scrap.r * w;
        ctx.save();
        ctx.translate(sr * 0.18, sr * 0.24);
        ctx.scale(1.12, 0.52);
        ctx.fillStyle = "rgba(0, 0, 0, 0.16)";
        ctx.beginPath();
        ctx.arc(0, 0, sr * 0.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "rgba(236, 233, 222, 0.92)";
        ctx.strokeStyle = "rgba(122, 119, 108, 0.32)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < 9; i++) {
          const t = (i / 9) * Math.PI * 2;
          const rr = sr * (0.78 + Math.sin(i * 2.1) * 0.18);
          const px = Math.cos(t) * rr;
          const py = Math.sin(t) * rr * 0.72;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.globalAlpha = 0.38;
        ctx.strokeStyle = "rgba(92, 92, 88, 0.55)";
        ctx.beginPath();
        ctx.moveTo(-sr * 0.45, -sr * 0.05);
        ctx.lineTo(sr * 0.44, sr * 0.12);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-sr * 0.10, -sr * 0.45);
        ctx.lineTo(sr * 0.18, sr * 0.42);
        ctx.stroke();
        ctx.restore();
      };

      const trashPile = [
        { x: -0.30, y: 0.23, r: 0.16, a: -0.4 },
        { x: -0.12, y: 0.25, r: 0.18, a: 0.5 },
        { x: 0.10, y: 0.25, r: 0.17, a: -0.2 },
        { x: 0.30, y: 0.22, r: 0.15, a: 0.35 },
        { x: -0.23, y: 0.08, r: 0.14, a: 0.2 },
        { x: -0.02, y: 0.08, r: 0.16, a: -0.7 },
        { x: 0.21, y: 0.08, r: 0.14, a: 0.72 },
        { x: -0.11, y: -0.06, r: 0.13, a: -0.15 },
        { x: 0.08, y: -0.07, r: 0.13, a: 0.45 }
      ];
      for (const scrap of trashPile) {
        drawMiniTrashBall(scrap);
      }

      ctx.globalAlpha = 0.52;
      ctx.fillStyle = "rgba(244, 241, 232, 0.86)";
      for (let i = 0; i < 7; i++) {
        const px = (-0.34 + i * 0.11) * w;
        const py = (0.13 + Math.sin(i * 1.7) * 0.08) * h;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(-0.7 + i * 0.31);
        ctx.beginPath();
        ctx.moveTo(-w * 0.045, -h * 0.018);
        ctx.lineTo(w * 0.045, -h * 0.010);
        ctx.lineTo(w * 0.030, h * 0.026);
        ctx.lineTo(-w * 0.036, h * 0.018);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();

      ctx.strokeStyle = "rgba(226, 236, 226, 0.62)";
      ctx.lineWidth = 2;
      ctx.lineJoin = "round";
      bodyPath();
      ctx.stroke();

      ctx.globalAlpha = 0.38;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * w * 0.16, -h * 0.28);
        ctx.lineTo(i * w * 0.10, h * 0.34);
        ctx.stroke();
      }
      for (let i = 0; i < 4; i++) {
        const yy = -h * 0.20 + i * h * 0.16;
        ctx.beginPath();
        ctx.moveTo(-w * 0.38 + i * 1.5, yy);
        ctx.quadraticCurveTo(0, yy + 8, w * 0.38 - i * 1.5, yy);
        ctx.stroke();
      }

      ctx.globalAlpha = 0.76;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-w * 0.52, -h * 0.40);
      ctx.quadraticCurveTo(0, -h * 0.50, w * 0.52, -h * 0.40);
      ctx.stroke();
      ctx.restore();
    }

    function drawTrashHint() {
      if (!state.opened || state.trash) return;
      const bin = trashBinTarget();
      ctx.save();
      ctx.textAlign = "right";
      ctx.textBaseline = "bottom";
      ctx.font = `400 ${clamp(Math.floor(Math.min(state.width, state.height) * 0.019), 14, 16)}px ${FONT_UI}`;
      ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
      ctx.shadowColor = "rgba(55, 25, 8, 0.55)";
      ctx.shadowBlur = 12;
      const x = Math.min(state.width - 24, bin.x + bin.w * 0.54);
      const y = Math.max(150, bin.y - bin.h * 0.72);
      ctx.fillText("不满意？双手揉掉扔进废纸篓重抽", x, y);
      ctx.restore();
    }

    function render(time) {
      drawBackground(time);
      const pointer = currentPointer();
      updateGestureCursor(pointer);
      drawCenterConfirmZone();
      drawTrashHint();
      drawTrashBin();

      const dimOthers = state.opened || (state.grabbed && state.grabbed.open > 0.22);
      const sorted = [...state.balls].sort((a, b) => (a.y + a.lift * 90) - (b.y + b.lift * 90));

      for (const ball of sorted) {
        if (ball.hidden || ball.trashing) continue;
        if (ball.open > 0.02) continue;
        ctx.save();
        if (dimOthers && ball !== state.grabbed) ctx.globalAlpha = 0.34;
        drawCrumpledBall(ball);
        ctx.restore();
      }

      const activePaper = state.opened || state.grabbed;
      if (activePaper) {
        if (activePaper.open < 0.92) drawCrumpledBall(activePaper);
        drawOpenPaper(activePaper);
      }

      if (state.trash) {
        const ball = state.trash.ball;
        if (ball.open > 0.02) drawOpenPaper(ball);
        else drawCrumpledBall(ball);
      }

    }

    let lastFrame = performance.now();
    function frame(time) {
      const dt = Math.min(34, time - lastFrame);
      lastFrame = time;
      update(dt);
      render(time);
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerenter", (event) => {
      state.mouse.active = true;
      state.mouse.x = event.clientX;
      state.mouse.y = event.clientY;
    });

    canvas.addEventListener("pointermove", (event) => {
      state.mouse.active = true;
      state.mouse.x = event.clientX;
      state.mouse.y = event.clientY;
    });

    canvas.addEventListener("pointerleave", () => {
      state.mouse.active = false;
      state.mouse.down = false;
    });

    canvas.addEventListener("pointerdown", (event) => {
      state.mouse.active = true;
      state.mouse.down = true;
      state.mouse.x = event.clientX;
      state.mouse.y = event.clientY;
      if (!state.hand && !state.opened && !state.trash && performance.now() >= state.trashCooldownUntil) {
        const pointer = {
          active: true,
          index: { x: state.mouse.x, y: state.mouse.y },
          pinchPoint: { x: state.mouse.x, y: state.mouse.y },
          pinch: true,
          pinchRelaxed: true,
          openPalm: false
        };
        state.selected = selectBall(pointer);
        if (state.selected) {
          state.grabbed = state.selected;
          state.grabbed.pickAge = 0;
          state.grabbed.settled = false;
          state.grabbed.settleFrames = 0;
          state.grabbed.open = 0;
          state.centerConfirmProgress = 0;
          state.pinchStartedAt = performance.now();
        }
      }
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointerup", (event) => {
      state.mouse.down = false;
      if (!state.hand && state.grabbed && !state.opened && !state.trash && performance.now() >= state.trashCooldownUntil) {
        if (isInCenterConfirmZone(state.grabbed) && state.centerConfirmProgress > 0.72) {
          openBall(state.grabbed);
        } else {
          state.grabbed.lift = 0;
          state.grabbed = null;
          state.centerConfirmProgress = 0;
        }
      }
      if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
    });

    window.addEventListener("resize", resize);
    setupSceneSelect();
    setupSceneManager();
    setupCameraCard();
    setupFullscreen();
    setupShareActions();
    resize();
    requestAnimationFrame(frame);
    startCamera();
  </script>
</body>
</html>
